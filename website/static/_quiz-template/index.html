<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teste de Fixação</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f7f7f9;
        color: #222;
      }

      .wrapper {
        max-width: 900px;
        margin: 32px auto;
        padding: 0 16px 32px;
      }

      .card {
        background: #fff;
        border: 1px solid #e5e5ea;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 20px;
      }

      h1 {
        margin-top: 0;
      }

      .muted {
        color: #666;
      }

      .question {
        border: 1px solid #e5e5ea;
        border-radius: 8px;
        padding: 14px;
        margin-bottom: 14px;
      }

      .question-title {
        font-weight: 600;
        margin-bottom: 8px;
      }

      .option {
        display: block;
        margin: 6px 0;
      }

      .result {
        margin-top: 6px;
        font-size: 14px;
        color: #555;
      }

      .btn {
        border-radius: 6px;
        padding: 10px 14px;
        cursor: pointer;
        border: none;
        font-weight: 600;
      }

      .btn-primary {
        background: #a2025a;
        color: #fff;
      }

      .btn-secondary {
        background: #fff;
        color: #a2025a;
        border: 1px solid #a2025a;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .score {
        margin-top: 14px;
        padding: 12px;
        border-radius: 8px;
        background: #f8f3f6;
      }

      .warning {
        margin-top: 12px;
        padding: 10px;
        border-radius: 8px;
        background: #fff3cd;
        border: 1px solid #ffe69c;
        color: #664d03;
        font-size: 14px;
      }

      .btn[disabled] {
        opacity: 0.55;
        cursor: not-allowed;
      }

      a {
        color: #a2025a;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <h1 id="quizTitle">Carregando…</h1>
        <p class="muted">
          Responda às perguntas e clique em <strong>Finalizar Teste</strong> para
          ver o total de acertos.
        </p>
        <p>
          Progresso: <strong id="answeredCount">0</strong> de
          <strong id="totalCount">0</strong> perguntas respondidas.
        </p>
      </div>

      <div id="questionsRoot" class="card"></div>

      <div class="card">
        <div class="actions">
          <button id="submitBtn" class="btn btn-primary" type="button">
            Finalizar Teste
          </button>
          <button id="resetBtn" class="btn btn-secondary" type="button">
            Tentar Novamente
          </button>
        </div>

        <div id="scoreBox" class="score" style="display: none"></div>
        <div id="warningBox" class="warning" style="display: none"></div>

        <p style="margin-top: 18px" id="backLinkContainer"></p>
      </div>
    </div>

    <script>
      (function () {
        const answers = {};
        let submitted = false;
        let questions = [];

        const root = document.getElementById("questionsRoot");
        const answeredCountEl = document.getElementById("answeredCount");
        const totalCountEl = document.getElementById("totalCount");
        const scoreBox = document.getElementById("scoreBox");
        const warningBox = document.getElementById("warningBox");
        const submitBtn = document.getElementById("submitBtn");
        const resetBtn = document.getElementById("resetBtn");
        const quizTitle = document.getElementById("quizTitle");
        const backLinkContainer = document.getElementById("backLinkContainer");

        function getScore() {
          let score = 0;
          questions.forEach(function (q) {
            if (answers[q.id] === q.correctIndex) score += 1;
          });
          return score;
        }

        function updateProgress() {
          const answeredCount = Object.keys(answers).length;
          answeredCountEl.textContent = String(answeredCount);
          submitBtn.disabled = answeredCount < questions.length || submitted;
        }

        function render() {
          root.innerHTML = "";

          questions.forEach(function (q) {
            const box = document.createElement("div");
            box.className = "question";

            const title = document.createElement("p");
            title.className = "question-title";
            title.textContent = q.id + ". " + q.prompt;
            box.appendChild(title);

            q.options.forEach(function (opt, idx) {
              const label = document.createElement("label");
              label.className = "option";

              const input = document.createElement("input");
              input.type = "radio";
              input.name = "question-" + q.id;
              input.value = String(idx);
              input.checked = answers[q.id] === idx;
              input.disabled = submitted;
              input.style.marginRight = "8px";

              input.addEventListener("change", function () {
                answers[q.id] = idx;
                updateProgress();
              });

              label.appendChild(input);
              label.appendChild(document.createTextNode(opt));

              if (submitted && answers[q.id] === idx && idx !== q.correctIndex) {
                label.style.color = "#b00020";
              }
              if (submitted && answers[q.id] === idx && idx === q.correctIndex) {
                label.style.color = "#0b6b2f";
              }

              box.appendChild(label);
            });

            if (submitted) {
              const result = document.createElement("p");
              result.className = "result";
              result.innerHTML =
                "Resposta correta: <strong>" +
                q.options[q.correctIndex] +
                "</strong><br><strong>Explicação:</strong> " +
                q.explanation;
              box.appendChild(result);
            }

            root.appendChild(box);
          });

          if (submitted) {
            const score = getScore();
            const total = questions.length;
            const percent = Math.round((score / total) * 100);
            scoreBox.style.display = "block";
            scoreBox.innerHTML =
              "Resultado final: <strong>" +
              score +
              "</strong> acertos de <strong>" +
              total +
              "</strong> (" +
              percent +
              "%).";
            warningBox.style.display = "none";
            warningBox.innerHTML = "";
          } else {
            scoreBox.style.display = "none";
            scoreBox.innerHTML = "";
          }
        }

        submitBtn.addEventListener("click", function () {
          const answeredCount = Object.keys(answers).length;
          if (answeredCount < questions.length) {
            warningBox.style.display = "block";
            warningBox.innerHTML =
              "Responda todas as perguntas antes de finalizar. Faltam <strong>" +
              (questions.length - answeredCount) +
              "</strong> pergunta(s).";
            return;
          }

          submitted = true;
          submitBtn.disabled = true;
          render();
        });

        resetBtn.addEventListener("click", function () {
          Object.keys(answers).forEach(function (k) {
            delete answers[k];
          });
          submitted = false;
          warningBox.style.display = "none";
          warningBox.innerHTML = "";
          updateProgress();
          render();
        });

        // Carrega as questões do arquivo questions.json na mesma pasta.
        // Para criar um novo quiz: copie esta pasta, troque o questions.json.
        fetch("questions.json")
          .then(function (res) {
            if (!res.ok) {
              throw new Error("Erro ao carregar questões: " + res.status);
            }
            return res.json();
          })
          .then(function (data) {
            questions = data.questions;

            document.title = data.title || "Teste de Fixação";
            quizTitle.textContent = data.title || "Teste de Fixação";

            if (data.backLink && data.backLabel) {
              backLinkContainer.innerHTML =
                'Voltar para conteúdo: <a href="' +
                data.backLink +
                '">' +
                data.backLabel +
                "</a>";
            }

            totalCountEl.textContent = String(questions.length);
            submitBtn.disabled = true;
            render();
          })
          .catch(function (err) {
            root.innerHTML =
              '<p style="color:#b00020">Não foi possível carregar as questões. ' +
              err.message +
              "</p>";
          });
      })();
    </script>
  </body>
</html>
